name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  check-pages:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.pages.outputs.enabled }}
    steps:
      - id: pages
        name: Check GitHub Pages setup
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          response="$(gh api "repos/${GITHUB_REPOSITORY}/pages" 2>/dev/null)"
          status=$?
          set -e

          if [[ $status -ne 0 ]]; then
            echo "GitHub Pages is not enabled yet. Skipping deploy."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          build_type="$(jq -r '.build_type // empty' <<< "$response")"
          if [[ "$build_type" != "workflow" ]]; then
            echo "GitHub Pages is enabled, but the source is not GitHub Actions. Skipping deploy."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

  build:
    needs: check-pages
    if: needs.check-pages.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Configure base path and site URL
        run: |
          # Compute the GitHub Pages base path: "/<repo>/" for project sites,
          # "/" for user/organisation sites (repo named "<user>.github.io").
          OWNER="${GITHUB_REPOSITORY%%/*}"
          REPO="${GITHUB_REPOSITORY#*/}"
          OWNER_LC="${OWNER,,}"
          if [[ "$REPO" == *.github.io ]]; then
            echo "VITE_BASE_PATH=/" >> "$GITHUB_ENV"
            echo "VITE_SITE_URL=https://${OWNER_LC}.github.io" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE_PATH=/$REPO/" >> "$GITHUB_ENV"
            echo "VITE_SITE_URL=https://${OWNER_LC}.github.io/$REPO" >> "$GITHUB_ENV"
          fi
          echo "VITE_GITHUB_REPO=$GITHUB_REPOSITORY" >> "$GITHUB_ENV"
          echo "VITE_GITHUB_BRANCH=$GITHUB_REF_NAME" >> "$GITHUB_ENV"
      - name: Build
        run: bun run build
        env:
          VITE_BASE_PATH: ${{ env.VITE_BASE_PATH }}
          VITE_SITE_URL: ${{ env.VITE_SITE_URL }}
          VITE_GITHUB_REPO: ${{ env.VITE_GITHUB_REPO }}
          VITE_GITHUB_BRANCH: ${{ env.VITE_GITHUB_BRANCH }}
      - name: Prepare static site
        run: |
          # TanStack Start SPA mode emits a single _shell.html in dist/client.
          # GitHub Pages needs index.html (homepage) and 404.html (deep-link
          # fallback) so client-side routing works on hard refresh.
          cp dist/client/_shell.html dist/client/index.html
          cp dist/client/_shell.html dist/client/404.html
          # Disable Jekyll so files/folders starting with _ are served as-is.
          touch dist/client/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

  deploy:
    needs: [check-pages, build]
    if: needs.check-pages.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
