name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # Skip the very first push that creates the `main` branch (i.e. the
    # initial commit GitHub makes when the user clicks "Use this template").
    # At that point GitHub Pages is not configured yet, so a deploy attempt
    # would fail. Subsequent pushes — and manual `workflow_dispatch` runs —
    # build and deploy normally.
    if: github.event_name == 'workflow_dispatch' || github.event.created != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Configure base path and site URL
        run: |
          # Compute the GitHub Pages base path: "/<repo>/" for project sites,
          # "/" for user/organisation sites (repo named "<user>.github.io").
          OWNER="${GITHUB_REPOSITORY%%/*}"
          REPO="${GITHUB_REPOSITORY#*/}"
          OWNER_LC="${OWNER,,}"
          if [[ "$REPO" == *.github.io ]]; then
            echo "VITE_BASE_PATH=/" >> "$GITHUB_ENV"
            echo "VITE_SITE_URL=https://${OWNER_LC}.github.io" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE_PATH=/$REPO/" >> "$GITHUB_ENV"
            echo "VITE_SITE_URL=https://${OWNER_LC}.github.io/$REPO" >> "$GITHUB_ENV"
          fi
          echo "VITE_GITHUB_REPO=$GITHUB_REPOSITORY" >> "$GITHUB_ENV"
          echo "VITE_GITHUB_BRANCH=$GITHUB_REF_NAME" >> "$GITHUB_ENV"
      - name: Build
        run: bun run build
        env:
          VITE_BASE_PATH: ${{ env.VITE_BASE_PATH }}
          VITE_SITE_URL: ${{ env.VITE_SITE_URL }}
          VITE_GITHUB_REPO: ${{ env.VITE_GITHUB_REPO }}
          VITE_GITHUB_BRANCH: ${{ env.VITE_GITHUB_BRANCH }}
      - name: Prepare static site
        run: |
          # TanStack Start SPA mode emits a single _shell.html in dist/client.
          # GitHub Pages needs index.html (homepage) and 404.html (deep-link
          # fallback) so client-side routing works on hard refresh.
          cp dist/client/_shell.html dist/client/index.html
          cp dist/client/_shell.html dist/client/404.html
          # Disable Jekyll so files/folders starting with _ are served as-is.
          touch dist/client/.nojekyll
      - uses: actions/configure-pages@v5
        with:
          # Auto-enable GitHub Pages (with Actions as the source) on the
          # first real run, so the user doesn't have to flip the Pages
          # source manually before the first deploy.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

  deploy:
    needs: build
    if: github.event_name == 'workflow_dispatch' || github.event.created != true
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
