name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Configure base path
        run: |
          # Compute the GitHub Pages base path: "/<repo>/" for project sites,
          # "/" for user/organisation sites (repo named "<user>.github.io").
          REPO="${GITHUB_REPOSITORY#*/}"
          if [[ "$REPO" == *.github.io ]]; then
            echo "VITE_BASE_PATH=/" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE_PATH=/$REPO/" >> "$GITHUB_ENV"
          fi
      - name: Build
        run: bun run build
        env:
          VITE_BASE_PATH: ${{ env.VITE_BASE_PATH }}
      - name: Add SPA 404 fallback
        run: |
          # GitHub Pages serves /404.html for unknown paths.
          # Copy index.html so client-side routing works on direct deep links.
          if [ -f dist/index.html ]; then cp dist/index.html dist/404.html; fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
